name: Sync block library

# Vendors the blocks listed in block-library.json ("vendored") from the library repo
# and opens a pull request with the updates. Runs on a schedule and on demand.
#
# Setup:
#   • Set sources.default.url in block-library.json to your library repo.
#   • If the library repo is PRIVATE, add a repo secret BLOCK_LIBRARY_TOKEN
#     (a PAT / fine-grained token with read access to it). Public repos need nothing.
#   • Allow GitHub Actions to create pull requests:
#     Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests".

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Configure git auth for a private library repo
        if: ${{ secrets.BLOCK_LIBRARY_TOKEN != '' }}
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.BLOCK_LIBRARY_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"

      - name: Sync vendored blocks
        run: npm run blocks:sync

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/block-library-sync
          title: 'chore: sync block library'
          commit-message: 'chore: sync vendored blocks from library'
          body: |
            Automated sync of vendored blocks from the block library.

            Generated by `tools/blocks/cli.mjs sync`. Vendored blocks are read-only in this
            repo — edit them in the library repo, not here.
          labels: block-library
          delete-branch: true
