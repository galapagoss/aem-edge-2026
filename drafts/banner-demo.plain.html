<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Demo</title>
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="stylesheet" href="/styles/lazy-styles.css">
</head>
<body>
  <header></header>
  <main>
    <div>
      <h1>Banner Component Demo</h1>

      <h2>Banner sin imagen (simple)</h2>
      <div class="banner">
        <div>
          <div>
            <h2>Bienvenido a nuestro sitio</h2>
          </div>
        </div>
        <div>
          <div>
            <p>Descubre todos nuestros productos y servicios diseñados para ti.</p>
          </div>
        </div>
        <div>
          <div>
            <a href="#" class="button">Ver más</a>
          </div>
        </div>
      </div>

      <h2>Banner con imagen de fondo</h2>
      <div class="banner">
        <div>
          <div>
            <picture>
              <img src="https://picsum.photos/1600/600" alt="Banner background" loading="lazy">
            </picture>
          </div>
        </div>
        <div>
          <div>
            <h2>Explora el mundo</h2>
          </div>
        </div>
        <div>
          <div>
            <p>Aventuras increíbles te esperan en cada rincón del planeta.</p>
          </div>
        </div>
        <div>
          <div>
            <a href="#" class="button">Descubrir</a>
          </div>
        </div>
      </div>

    </div>
  </main>
  <footer></footer>
  <script type="module" src="/scripts/scripts.js"></script>
</body>
</html>
